<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in | TasteBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-shell">
    <section class="auth-hero"><div><a class="brand" href="/login.html">Taste<span>Bite</span></a><h1>Good food,<br>delivered with joy.</h1><p>Your favourite local flavours are only a few taps away.</p></div><div class="hero-food">?? <span>??</span> ??</div></section>
    <section class="auth-panel"><form id="authForm" class="auth-card"><span class="eyebrow">WELCOME TO TASTEBITE</span><h2 id="authTitle">Sign in to order</h2><p class="muted" id="authText">New here? <button type="button" class="link-button" id="toggleAuth">Create an account</button></p><label id="nameLabel" class="hidden">Full name<input id="name" type="text" placeholder="Your name"></label><label>Email address<input id="email" type="email" required placeholder="you@example.com"></label><label>Password<input id="password" type="password" required minlength="6" placeholder="••••••••"></label><button class="primary" id="authSubmit">Sign in</button><p id="authError" class="error" role="alert"></p><div class="demo-note">Demo: <b>demo@tastebite.in</b> / <b>welcome123</b></div></form></section>
  </div>
  <script src="login.js"></script>
</body>
</html>
