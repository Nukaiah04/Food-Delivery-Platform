# Cloud Build CI/CD: GitHub -> Artifact Registry -> Compute Engine VM
substitutions:
  _REGION: us-central1
  _REPOSITORY: tastebite
  _IMAGE_NAME: tastebite
  _VM_NAME: tastebite-vm
  _VM_ZONE: us-central1-a

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s

steps:
  - id: install-dependencies-and-test
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - |
        npm install --ignore-scripts --no-audit --no-fund
        node --check server.js
        node --check public/app.js
        node --check public/login.js

  # Optional: add a SonarQube scanner step here after storing its token in Secret Manager.
  - id: trivy-security-scan
    name: aquasec/trivy:0.58.1
    entrypoint: trivy
    args: ['fs', '--exit-code=1', '--severity=HIGH,CRITICAL', '--ignore-unfixed', '.']

  - id: build-docker-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest
      - .

  - id: push-commit-image
    name: gcr.io/cloud-builders/docker
    args: [push, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA']

  - id: push-latest-image
    name: gcr.io/cloud-builders/docker
    args: [push, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest']

  - id: deploy-to-compute-engine
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"
        gcloud compute ssh "${_VM_NAME}" \
          --zone="${_VM_ZONE}" \
          --quiet \
          --command="sudo /opt/tastebite/deploy-container.sh $$IMAGE"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest