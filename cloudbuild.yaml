substitutions:
  _REGION: us-central1
  _REPOSITORY: tastebite
  _VM_NAME: tastebite-vm
  _VM_ZONE: us-central1-a
options:
  logging: CLOUD_LOGGING_ONLY
steps:
  - id: test
    name: node:20-alpine
    entrypoint: sh
    args: ['-c', 'node --check server.js && node --check public/app.js && node --check public/login.js']
  # Optional SonarQube step: retrieve a Sonar token from Secret Manager and add sonar-scanner here.
  - id: trivy-security-scan
    name: aquasec/trivy:0.58.1
    entrypoint: trivy
    args: ['fs', '--exit-code=1', '--severity=HIGH,CRITICAL', '--ignore-unfixed', '.']  
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args: [build, -t, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/tastebite:$COMMIT_SHA', -t, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/tastebite:latest', .]
  - id: push-commit-image
    name: gcr.io/cloud-builders/docker
    args: [push, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/tastebite:$COMMIT_SHA']
  - id: push-latest-image
    name: gcr.io/cloud-builders/docker
    args: [push, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/tastebite:latest']
  - id: deploy-to-compute-engine
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        gcloud compute ssh "${_VM_NAME}" --zone="${_VM_ZONE}" --quiet --command \
          "sudo /opt/tastebite/deploy-container.sh '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/tastebite:$COMMIT_SHA'"
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/tastebite:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/tastebite:latest